spring:
  application:
    name: platform-backend-test

  # Disable schema.sql execution for tests (H2 auto-creates schema)
  sql:
    init:
      mode: never

  # Test Database Configuration (H2 in-memory)
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  # H2 Console (for debugging)
  h2:
    console:
      enabled: true

  # Redis Test Configuration (Embedded Redis)
  data:
    redis:
      host: localhost
      port: 6379
      password:

# JWT Configuration for tests
app:
  jwt:
    secret: testSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong12345678
    expiration-ms: 86400000      # 24 hours
    refresh-expiration-ms: 604800000  # 7 days
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
  internal:
    service-token: test-internal-service-token

# Disable Nacos registration in tests
nacos:
  discovery:
    enabled: false

# Logging
logging:
  level:
    com.edu.platform: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
