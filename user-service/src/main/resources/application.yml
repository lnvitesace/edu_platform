server:
  port: ${SERVER_PORT:8001}
  servlet:
    context-path: /
  shutdown: graceful

spring:
  application:
    name: user-service

  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:edu_user}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:change-me}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000

app:
  jwt:
    secret: ${JWT_SECRET:change-me-with-a-minimum-32-character-jwt-secret}
    expiration-ms: 86400000  # 24 hours
    refresh-expiration-ms: 604800000  # 7 days
  cors:
    allowed-origins: ${WEB_APP_ORIGIN:http://localhost:3000},${WEB_APP_VITE_ORIGIN:http://localhost:5173}
  internal:
    service-token: ${INTERNAL_SERVICE_TOKEN}

logging:
  level:
    com.edu.platform: INFO
    org.springframework.security: INFO

nacos:
  discovery:
    enabled: ${NACOS_DISCOVERY_ENABLED:true}
    server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
    namespace: public
    group: DEFAULT_GROUP

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
