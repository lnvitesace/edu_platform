spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  h2:
    console:
      enabled: true

nacos:
  discovery:
    enabled: false
    server-addr: localhost:8848
    namespace: public
    group: DEFAULT_GROUP

logging:
  level:
    com.edu.course: DEBUG

app:
  internal:
    service-token: test-internal-service-token
