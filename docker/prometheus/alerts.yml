groups:
  # 服务可用性告警
  - name: service-availability
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "服务宕机: {{ $labels.job }}"
          description: "服务 {{ $labels.job }} 已停止响应超过 1 分钟"

      - alert: ServiceHighRestartRate
        expr: changes(process_start_time_seconds[1h]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "服务频繁重启: {{ $labels.job }}"
          description: "服务 {{ $labels.job }} 在过去 1 小时内重启超过 3 次"

  # JVM 内存告警
  - name: jvm-memory
    rules:
      - alert: JvmHeapUsageHigh
        expr: (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM 堆内存使用率过高: {{ $labels.job }}"
          description: "服务 {{ $labels.job }} 堆内存使用率超过 85%，当前值: {{ $value | printf \"%.1f\" }}%"

      - alert: JvmHeapUsageCritical
        expr: (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}) > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "JVM 堆内存即将耗尽: {{ $labels.job }}"
          description: "服务 {{ $labels.job }} 堆内存使用率超过 95%，可能即将 OOM"

  # CPU 告警
  - name: cpu-usage
    rules:
      - alert: HighCpuUsage
        expr: system_cpu_usage > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU 使用率过高: {{ $labels.job }}"
          description: "服务 {{ $labels.job }} CPU 使用率超过 80%，当前值: {{ $value | printf \"%.1f\" }}%"

      - alert: ProcessCpuHigh
        expr: process_cpu_usage > 0.9
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "进程 CPU 使用率过高: {{ $labels.job }}"
          description: "服务 {{ $labels.job }} 进程 CPU 使用率超过 90%"

  # HTTP 请求告警
  - name: http-requests
    rules:
      - alert: HighHttpErrorRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (job)
            /
            sum(rate(http_server_requests_seconds_count[5m])) by (job)
          ) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HTTP 5xx 错误率过高: {{ $labels.job }}"
          description: "服务 {{ $labels.job }} 5xx 错误率超过 1%"

      - alert: HttpResponseTimeSlow
        expr: |
          (
            rate(http_server_requests_seconds_sum[5m])
            /
            rate(http_server_requests_seconds_count[5m])
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HTTP 响应时间过长: {{ $labels.job }}"
          description: "服务 {{ $labels.job }} 平均响应时间超过 2 秒"

  # 数据库连接池告警
  - name: database-pool
    rules:
      - alert: HikariPoolExhausted
        expr: hikaricp_connections_pending > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "数据库连接池等待: {{ $labels.job }}"
          description: "服务 {{ $labels.job }} 有请求正在等待数据库连接"

      - alert: HikariPoolUsageHigh
        expr: |
          (hikaricp_connections_active / hikaricp_connections_max) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "数据库连接池使用率高: {{ $labels.job }}"
          description: "服务 {{ $labels.job }} 数据库连接池使用率超过 80%"

  # GC 告警
  - name: jvm-gc
    rules:
      - alert: HighGcPauseTime
        expr: rate(jvm_gc_pause_seconds_sum[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GC 暂停时间过长: {{ $labels.job }}"
          description: "服务 {{ $labels.job }} GC 暂停时间过长，可能影响性能"

  # 线程告警
  - name: jvm-threads
    rules:
      - alert: ThreadPoolExhausted
        expr: jvm_threads_live_threads > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "线程数过多: {{ $labels.job }}"
          description: "服务 {{ $labels.job }} 活动线程数超过 500"

  # 熔断器告警
  - name: circuit-breaker
    rules:
      - alert: CircuitBreakerOpen
        expr: resilience4j_circuitbreaker_state == 2
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "熔断器打开: {{ $labels.name }}"
          description: "网关熔断器 {{ $labels.name }} 已打开，下游服务可能不可用"

      - alert: CircuitBreakerHalfOpen
        expr: resilience4j_circuitbreaker_state == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "熔断器半开: {{ $labels.name }}"
          description: "网关熔断器 {{ $labels.name }} 处于半开状态超过 5 分钟"

      - alert: CircuitBreakerHighFailureRate
        expr: resilience4j_circuitbreaker_failure_rate > 0.3
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "熔断器失败率过高: {{ $labels.name }}"
          description: "熔断器 {{ $labels.name }} 失败率超过 30%，当前: {{ $value | printf \"%.1f\" }}%"
