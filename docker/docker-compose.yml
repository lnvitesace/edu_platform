# Education Platform - Infrastructure Services
# Usage: docker compose up -d

networks:
  edu-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  elasticsearch-data:
  rabbitmq-data:
  nacos-data:
  prometheus-data:
  grafana-data:
  loki-data:

services:
  # ============================================
  # MySQL 8.4 - Primary Database
  # ============================================
  mysql:
    image: mysql:8.4
    container_name: edu-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in docker/.env}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - edu-network
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=500
      - --innodb_buffer_pool_size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in docker/.env}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ============================================
  # Redis 8.4 - Cache & Session Store
  # ============================================
  redis:
    image: redis:8.4-alpine
    container_name: edu-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - edu-network
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ============================================
  # Nacos 3.1 - Service Registry & Config Center
  # ============================================
  nacos:
    image: nacos/nacos-server:v3.1.1
    container_name: edu-nacos
    platform: linux/amd64
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:-change-me-nacos-token}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:-serverIdentity}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:-security}
      JVM_XMS: 512m
      JVM_XMX: 1024m
      JVM_XMN: 256m
    ports:
      - "${NACOS_PORT:-8848}:8848"
      - "${NACOS_GRPC_PORT:-9848}:9848"
    volumes:
      - nacos-data:/home/nacos/data
    networks:
      - edu-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf 'http://localhost:8848/nacos/v1/ns/instance/list?serviceName=health-check' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ============================================
  # RabbitMQ 4.2 - Message Queue
  # ============================================
  rabbitmq:
    image: rabbitmq:4.2.3-management-alpine
    container_name: edu-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:?set RABBITMQ_PASS in docker/.env}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - edu-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ============================================
  # Elasticsearch 9.2 - Search Engine
  # ============================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.4
    container_name: edu-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=edu-cluster
      - bootstrap.memory_lock=true
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - edu-network
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=30s || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ============================================
  # Zipkin - Distributed Tracing
  # ============================================
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: edu-zipkin
    environment:
      - STORAGE_TYPE=mem
      - JAVA_OPTS=-Xms128m -Xmx256m
    ports:
      - "${ZIPKIN_PORT:-9411}:9411"
    networks:
      - edu-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9411/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ============================================
  # Microservices
  # ============================================

  gateway-service:
    build:
      context: ../gateway-service
      dockerfile: Dockerfile
    container_name: edu-gateway
    environment:
      SERVER_PORT: 8080
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-nacos:8848}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in docker/.env}
      WEB_APP_ORIGIN: ${WEB_APP_ORIGIN:-http://localhost:3000}
      WEB_APP_VITE_ORIGIN: ${WEB_APP_VITE_ORIGIN:-http://localhost:5173}
    ports:
      - "8080:8080"
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - edu-network
    stop_grace_period: 40s
    restart: unless-stopped

  user-service:
    build:
      context: ../user-service
      dockerfile: Dockerfile
    container_name: edu-user-service
    environment:
      SERVER_PORT: 8001
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-nacos:8848}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE_USER:-edu_user}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-root}
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in docker/.env}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in docker/.env}
      WEB_APP_ORIGIN: ${WEB_APP_ORIGIN:-http://localhost:3000}
      WEB_APP_VITE_ORIGIN: ${WEB_APP_VITE_ORIGIN:-http://localhost:5173}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?set INTERNAL_SERVICE_TOKEN in docker/.env}
    expose:
      - "8001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - edu-network
    stop_grace_period: 40s
    restart: unless-stopped

  course-service:
    build:
      context: ../course-service
      dockerfile: Dockerfile
    container_name: edu-course-service
    environment:
      SERVER_PORT: 8002
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-nacos:8848}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE_COURSE:-edu_course}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-root}
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in docker/.env}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS:?set RABBITMQ_PASS in docker/.env}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?set INTERNAL_SERVICE_TOKEN in docker/.env}
    expose:
      - "8002"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - edu-network
    stop_grace_period: 40s
    restart: unless-stopped

  search-service:
    build:
      context: ../search-service
      dockerfile: Dockerfile
    container_name: edu-search-service
    environment:
      SERVER_PORT: 8005
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-nacos:8848}
      ELASTICSEARCH_URIS: ${ELASTICSEARCH_URIS:-http://elasticsearch:9200}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS:?set RABBITMQ_PASS in docker/.env}
    expose:
      - "8005"
    depends_on:
      elasticsearch:
        condition: service_healthy
      nacos:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - edu-network
    stop_grace_period: 40s
    restart: unless-stopped

  # ============================================
  # Prometheus - Metrics Collection
  # ============================================
  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: edu-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - edu-network
    restart: unless-stopped

  # ============================================
  # Grafana - Metrics Visualization
  # ============================================
  grafana:
    image: grafana/grafana:12.3.2
    container_name: edu-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in docker/.env}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks:
      - edu-network
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  # ============================================
  # Loki - Log Aggregation
  # ============================================
  loki:
    image: grafana/loki:3.5.0
    container_name: edu-loki
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - edu-network
    restart: unless-stopped

  # ============================================
  # Promtail - Log Collector
  # ============================================
  promtail:
    image: grafana/promtail:3.5.0
    container_name: edu-promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - edu-network
    depends_on:
      - loki
    restart: unless-stopped
